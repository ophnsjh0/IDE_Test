# CaseFlow VM 배포 구성 — db(PostgreSQL) + backend(Django) + frontend(Next.js)
#
# 기동 전 준비 (git에 없는 파일들):
#   .env                       — API 키 + DJANGO_/POSTGRES_ 운영 변수 (.env.example 참고)
#                                운영 VM에서는 .env.age로 암호화 보관, caseflow-up.sh로 기동
#   gmail_secrets 볼륨         — credentials.json/token.json을 compose cp로 최초 1회 주입
#   backend/report_templates/  — 사내 실물 템플릿
#
# 기동: docker compose up -d --build  (운영 VM은 ~/bin/caseflow-up.sh 사용)
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-caseflow}
      POSTGRES_USER: ${POSTGRES_USER:-caseflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-caseflow}"]
      interval: 5s
      timeout: 3s
      retries: 12
    # ports 미공개 — 컨테이너 내부 네트워크 전용

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      # Gmail OAuth 파일은 호스트 평문 대신 명명 볼륨(root 전용 영역)에 보관.
      # 최초 1회 주입: docker compose cp credentials.json backend:/app/secrets/
      GMAIL_CREDENTIALS_FILE: /app/secrets/credentials.json
      GMAIL_TOKEN_FILE: /app/secrets/token.json
    volumes:
      - gmail_secrets:/app/secrets
      - ./backend/report_templates:/app/backend/report_templates:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      # 특정 주소로 고정하려면 주석 해제 (빌드 시점에 번들에 박힘):
      # args:
      #   NEXT_PUBLIC_API_BASE: http://<VM_IP>:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  # Gmail OAuth 비밀 파일 저장소 — 호스트에서는 root만 접근 가능
  gmail_secrets:
